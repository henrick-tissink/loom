<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>loom</title>
  </head>
  <body>
    <header id="titlebar">
      <span class="wordmark">
        <span class="wave"><i></i><i></i><i></i><i></i><i></i></span>
        <span class="mk">loom</span>
      </span>
      <div class="tb-right">
        <button id="search-btn" title="Search history (/)">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>
        </button>
        <span id="attn" class="attn"></span>
        <button id="new-session" title="New session">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>
          New
        </button>
      </div>
    </header>
    <main id="body">
      <aside id="rail">
        <div class="rail-head">Threads</div>
        <ul id="threads"></ul>
      </aside>
      <section id="stage"><div id="stage-empty">Select a session, or press + New</div></section>
    </main>
    <script type="module" src="/main.js"></script>
  </body>
</html>
